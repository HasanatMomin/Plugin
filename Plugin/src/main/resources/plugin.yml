name: McPvP
version: ${version}
main: com.hasanatmomin.mcpvp.McPvpPlugin
api-version: "26.1.2"
author: Copilot
description: Competitive PvP infrastructure plugin with queueing, matchmaking, duels, and persistent ranking.

commands:
  mcpvp:
    description: Main McPvP command
    usage: /mcpvp
    aliases: [mcp]
  queue:
    description: Join or leave the competitive queue
    usage: /queue [join|leave|status]
  duel:
    description: Start a duel against another player
    usage: /duel <player>

permissions:
  mcpvp.use:
    default: true
  mcpvp.admin:
    default: op
